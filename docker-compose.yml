# docker-compose.yml (root)
version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/src
      - ./packages:/packages
    environment:
      - NODE_ENV=development
    env_file:
      - ./apps/api/.env
    command: pnpm dev